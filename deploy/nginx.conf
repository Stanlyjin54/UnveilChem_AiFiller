server {
    listen 80;
    server_name api.unveilchem.com;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # 文件上传大小限制
    client_max_body_size 100M;
    
    # 静态文件服务
    location /static/ {
        alias /opt/unveilchem/backend/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 上传文件服务
    location /uploads/ {
        alias /opt/unveilchem/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        # 安全设置
        location ~* \.(php|php5|sh|py|pyc|pl)$ {
            deny all;
        }
    }
    
    # API代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 缓冲区设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # 健康检查
        location /health {
            access_log off;
            proxy_pass http://127.0.0.1:8000/health;
        }
    }
    
    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(db|sql|log|ini|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 访问日志
    access_log /var/log/nginx/unveilchem_access.log main;
    error_log /var/log/nginx/unveilchem_error.log warn;
}

# HTTPS重定向（启用SSL后）
server {
    listen 80;
    server_name www.unveilchem.com unveilchem.com;
    return 301 https://$server_name$request_uri;
}